parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/Model/'
            - '../src/Kernel.php'

    # Bind domain port interfaces to infrastructure implementations
    App\Domain\Port\DemoRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\DemoRepository
